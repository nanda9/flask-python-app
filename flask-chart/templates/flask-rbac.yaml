apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flask-pod-reader
  namespace: {{ .Release.Namespace }}

rules:
- apiGroups: [""]
  resources:
  - pods
  verbs:
  - get
  - list

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flask-pod-reader-binding
  namespace: {{ .Release.Namespace }}

subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}

roleRef:
  kind: Role
  name: flask-pod-reader
  apiGroup: rbac.authorization.k8s.io