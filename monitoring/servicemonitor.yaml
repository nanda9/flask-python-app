apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: flask-app
  namespace: monitoring

  labels:
    release: monitoring

spec:

  namespaceSelector:
    matchNames:
      - dev

  selector:
    matchLabels:
      app.kubernetes.io/name: flask-chart
      app.kubernetes.io/instance: my-python-app

  endpoints:

    - port: http
      path: /metrics
      interval: 15s