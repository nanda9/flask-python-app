name: Docker CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | \
          docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-python-app:latest .
      
      - name: Run Container Test
        run: |
          docker run -d -p 5000:5000 --name test-app \
          ${{ secrets.DOCKERHUB_USERNAME }}/my-python-app:latest

          sleep 5

          docker ps

          docker logs test-app

      - name: Push Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-python-app:latest
      
      - name: Verify Application
        run: |
          sleep 10
          curl --fail http://localhost:5000