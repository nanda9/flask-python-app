name: Build Docker Image

on:
  push:
    branches: ["main"]
    
permissions:
  contents: write   # required so the workflow can git push back

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # 3. Compute image tag once, persist across steps
      - name: Set image tag
        run: |
          echo "IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/my-python-app:${{ github.sha }}" >> "$GITHUB_ENV"

      # 4. Build + push image
      - name: Build and Push Docker image
        run: |
          echo "Building image: $IMAGE"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
      
      # 5. Update Kubernetes deployment.yaml
      - name: Update Kubernetes Image
        run: |
          echo "Updating deployment.yaml"

          sed -i "s|image: .*|image: $IMAGE|g" GitOps-Repo/deployment.yaml

          cat GitOps-Repo/deployment.yaml

      # 6. Commit GitOps change
      - name: Commit Kubernetes manifest
        run: |

          git config user.name "github-actions"

          git config user.email "github-actions@github.com"

          git add GitOps-Repo/deployment.yaml

          git commit -m "Update image to ${{ github.sha }}" || echo "No changes"

          git push
