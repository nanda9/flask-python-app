apiVersion: v1
kind: ServiceAccount
metadata:
  name: flask-sa
  namespace: dev

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flask-pod-reader
  namespace: dev

rules:
- apiGroups: [""]
  resources:
  - pods
  verbs:
  - get
  - list

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flask-pod-reader-binding
  namespace: dev

subjects:
- kind: ServiceAccount
  name: flask-sa
  namespace: dev

roleRef:
  kind: Role
  name: flask-pod-reader
  apiGroup: rbac.authorization.k8s.io